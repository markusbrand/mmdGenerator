# Create a PR with auto-fixes (lint/format). Trigger: label 'autofix' on PR or workflow_dispatch.
name: Autofix PR

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

jobs:
  autofix:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'autofix')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Backend fixes (ruff)
        run: |
          pip install ruff
          cd backend && ruff check app/ --fix || true
          ruff format app/ || true

      - name: Frontend fixes
        run: |
          cd frontend && npm ci
          npm run lint -- --fix 2>/dev/null || true

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: autofix/${{ github.run_id }}
          delete-branch: true
          title: "chore: apply autofix (lint/format)"
          body: "Automated fixes from lint/format. Please review."
          commit-message: "chore: apply autofix"
