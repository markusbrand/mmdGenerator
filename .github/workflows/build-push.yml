# Build multi-arch Docker image, push to GHCR, then deploy to Pi.
# All steps run in order: deploy only starts after the image is available.
name: Build and Deploy

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase; repo is markusbrand/mmdGenerator
  IMAGE_NAME: markusbrand/mmdgenerator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # Only runs after build has finished successfully (image is in GHCR).
  deploy:
    needs: build
    if: github.event_name == 'release'
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Set version and image
        id: vars
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          REPO="${{ github.repository }}"
          IMAGE="ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]'):${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Deploy container
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
        run: |
          set -e
          echo "Pulling ${IMAGE}..."
          docker pull "${IMAGE}"
          docker stop mmdgenerator 2>/dev/null || true
          docker rm mmdgenerator 2>/dev/null || true
          docker run -d --name mmdgenerator --restart unless-stopped -p 8000:8000 \
            -v mmdgenerator-data:/data -v mmdgenerator-logs:/logs \
            -e MMD_DATA_DIR=/data -e LOG_DIR=/logs \
            "${IMAGE}"
          echo "Deployed ${IMAGE}"
