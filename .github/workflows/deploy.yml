# Deploy on Raspberry Pi when a release is published.
# Runs on a self-hosted runner ON the Pi (no SSH from internet needed).
name: Deploy to Pi

on:
  release:
    types: [published]

jobs:
  deploy:
    # Run on the Pi: install a self-hosted runner there and use label "raspberry-pi"
    runs-on: [self-hosted, linux, raspberry-pi]
    steps:
      - name: Set version
        id: vars
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Deploy container
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.version }}
        run: |
          set -e
          echo "Pulling ${IMAGE}..."
          docker pull "${IMAGE}"
          docker stop mmdgenerator 2>/dev/null || true
          docker rm mmdgenerator 2>/dev/null || true
          docker run -d --name mmdgenerator --restart unless-stopped -p 8000:8000 \
            -v mmdgenerator-data:/data -v mmdgenerator-logs:/logs \
            -e MMD_DATA_DIR=/data -e LOG_DIR=/logs \
            "${IMAGE}"
          echo "Deployed ${IMAGE}"