# Deploy to Raspberry Pi via SSH when a release is published
name: Deploy to Pi

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set version and image
        id: vars
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "IMAGE=ghcr.io/${{ github.repository }}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            IMAGE="${{ steps.vars.outputs.IMAGE }}"
            VERSION="${{ steps.vars.outputs.VERSION }}"
            docker pull "${IMAGE}:${VERSION}"
            docker stop mmdgenerator 2>/dev/null || true
            docker rm mmdgenerator 2>/dev/null || true
            docker run -d --name mmdgenerator --restart unless-stopped -p 8000:8000 \
              -v mmdgenerator-data:/data -v mmdgenerator-logs:/logs \
              -e MMD_DATA_DIR=/data -e LOG_DIR=/logs \
              "${IMAGE}:${VERSION}"
            echo "Deployed ${IMAGE}:${VERSION}"
