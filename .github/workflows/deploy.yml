# Deploy on Raspberry Pi when a release is published.
# Runs on a self-hosted runner ON the Pi (no SSH from internet needed).
# Security: only runs on release (not pull_request). Do not use the raspberry-pi
# runner in any workflow that runs on pull_request (fork code could run on your Pi).
name: Deploy to Pi

on:
  release:
    types: [published]

jobs:
  deploy:
    # Only run for release events (never for pull_request from forks)
    if: github.event_name == 'release'
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Set version and image
        id: vars
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          REPO="${{ github.repository }}"
          IMAGE="ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]'):${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Deploy container
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
        run: |
          set -e
          echo "Pulling ${IMAGE}..."
          docker pull "${IMAGE}"
          docker stop mmdgenerator 2>/dev/null || true
          docker rm mmdgenerator 2>/dev/null || true
          docker run -d --name mmdgenerator --restart unless-stopped -p 8000:8000 \
            -v mmdgenerator-data:/data -v mmdgenerator-logs:/logs \
            -e MMD_DATA_DIR=/data -e LOG_DIR=/logs \
            "${IMAGE}"
          echo "Deployed ${IMAGE}"